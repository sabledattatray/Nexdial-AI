; =============================================
; NexDial Dialplan
; Clean rebuild - 2026-05-16
; =============================================

[general]
static=yes
writeprotect=no

[globals]

; --- Context for calls FROM the browser (NexDial UI) ---
[nexdial-outbound]
; Match any number and route to MicroSIP gateway
exten => _X.,1,NoOp(NexDial outbound call to ${EXTEN})
 same => n,Dial(PJSIP/android_gateway,60)
 same => n,Hangup()

; Match numbers starting with + (international format)
exten => _+X.,1,NoOp(NexDial outbound call to ${EXTEN})
 same => n,Dial(PJSIP/android_gateway,60)
 same => n,Hangup()

; --- Context for calls FROM the gateway (MicroSIP) ---
[from-gateway]
exten => _X.,1,NoOp(Inbound from gateway: ${EXTEN})
 same => n,Dial(PJSIP/nexdial_ui,60)
 same => n,Hangup()
