; =============================================
; NexDial Production PJSIP Configuration
; Clean rebuild - 2026-05-16
; =============================================

; --- UDP Transport (for MicroSIP / softphones) ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; --- WebSocket Transport (for browser SIP.js) ---
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0

; =============================================
; ENDPOINT: nexdial_ui (Browser WebRTC)
; =============================================
[nexdial_ui]
type=endpoint
transport=transport-ws
context=nexdial-outbound
disallow=all
allow=ulaw
allow=alaw
allow=opus
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls
aors=nexdial_ui
auth=nexdial_ui_auth

[nexdial_ui_auth]
type=auth
auth_type=userpass
username=nexdial_ui
password=nexdial123

[nexdial_ui]
type=aor
max_contacts=5
remove_existing=yes

; =============================================
; ENDPOINT: android_gateway (MicroSIP / Softphone)
; =============================================
[android_gateway]
type=endpoint
transport=transport-udp
context=from-gateway
disallow=all
allow=ulaw
allow=alaw
aors=android_gateway
auth=android_gateway_auth
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[android_gateway_auth]
type=auth
auth_type=userpass
username=android_gateway
password=nexdial123

[android_gateway]
type=aor
max_contacts=5
remove_existing=yes
